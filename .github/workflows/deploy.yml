name: Deploy to GitHub Pages

# main에 푸시하면 앱을 빌드해 GitHub Pages에 배포한다.
# 사전 데이터·발음 mp3는 저장소에 커밋돼 있어 파이썬 파이프라인 없이 빌드된다.
# 사용 전: 저장소 Settings → Pages → Source를 "GitHub Actions"로 한 번 설정.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
